<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Service Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
   <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <style>
    /* .service-management-outlet, .service-management-outlet * { font-family: 'DM Sans', sans-serif; } */
    
    /* Global Background matched to the clean aesthetic from image_499edf.jpg */
    .service-management-outlet { background: #f7f3ed; color: #4a3b32; }

    /* Clean professional color overrides based on the reference photo */
    .tab-btn.active { color: #6e4e58; border-bottom: 2px solid #6e4e58; }
    .text-custom-primary { color: #6e4e58; }
    .bg-custom-primary { background-color: #6e4e58; }
    .bg-custom-primary:hover { background-color: #593e46; }
    .border-custom-accent { border-color: #e8ded1; }

    .badge-venue    { background:#ebdcd0; color:#593e46; }
    .badge-makeup   { background:#f5e6e8; color:#7a525d; }
    .badge-photo    { background:#dbe8f5; color:#324a6e; }
    .badge-catering { background:#dcf5e8; color:#27543f; }
    .badge-decor    { background:#fdf2db; color:#6e5621; }
    .badge-music    { background:#fbe3e4; color:#732633; }
    .badge-others   { background:#edebe9; color:#403e3d; }

    /* hover dropdown for Add New Service */
    .add-svc-wrap:hover .add-svc-menu,
    .add-svc-menu:hover { display:block; }
    .add-svc-menu { display:none; }

    /* modal */
    .modal-body { overflow-y:auto; }

    /* image upload */
    .img-upload { border:2px dashed #d1c7bd; cursor:pointer; }
    .img-upload:hover { border-color:#6e4e58; background:#fbf9f6; }

    .service-management-outlet input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }

    /* Status pill */
    .status-pill { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:700; padding:3px 8px; border-radius:999px; border:1px solid transparent; user-select:none; pointer-events:none; letter-spacing:0.02em; backdrop-filter:blur(4px); }
    .status-pill.active-pill   { background:rgba(220,252,231,0.92); color:#166534; border-color:rgba(187,247,208,0.8); }
    .status-pill.inactive-pill { background:rgba(243,244,246,0.92); color:#6B7280; border-color:rgba(229,231,235,0.8); }
    .status-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .dot-green  { background:#22C55E; }
    .dot-gray   { background:#9CA3AF; }

    /* Card subtle design refinements */
    .service-card {
      transition: box-shadow 0.26s ease, transform 0.26s ease, border-color 0.2s;
      background-color: #1a1512;
      border-color: #2e2520;
      position: relative;
      overflow: hidden;
      aspect-ratio: 3 / 4;
      min-height: 300px;
    }
    .service-card > .p-4 {
      background-color: transparent;
    }
    .service-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px -8px rgba(74, 59, 50, 0.3), 0 4px 12px -2px rgba(74, 59, 50, 0.2);
      border-color: #d7c8aa;
    }

    /* Full-bleed image — fills the entire card */
    .card-img-wrap {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .card-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: block;
    }
    .card-icon {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .service-card:hover .card-img-wrap img { transform: scale(1.07); }
    .service-card:hover .card-img-wrap .card-icon { transform: scale(1.05); }

    /* Layered progressive blur — true frosted glass fading in from bottom */
    .card-img-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
    }
    .card-img-overlay::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 70%;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: linear-gradient(
        to top,
        rgba(8, 6, 5, 0.85) 0%,
        rgba(8, 6, 5, 0.60) 30%,
        rgba(8, 6, 5, 0.20) 60%,
        transparent 100%
      );
      -webkit-mask-image: linear-gradient(to top, black 35%, transparent 100%);
      mask-image: linear-gradient(to top, black 35%, transparent 100%);
    }

    /* Content sits above overlay */
    .card-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      height: 100%;
      padding-top: 0;
    }

    /* Text color adjustments for dark overlay */
    .service-card h3 { color: #f5ede4 !important; }
    .service-card .text-custom-primary { color: #e8c9a0 !important; }
    .service-card .text-gray-400 { color: #b0a090 !important; }
    .service-card .border-t { border-color: rgba(255,255,255,0.12) !important; }

    /* Card buttons */
    .btn-card {
      transition: background 0.15s, color 0.15s, box-shadow 0.15s, transform 0.15s;
      font-size: 12px; font-weight: 600;
    }
    .btn-card:hover { transform: translateY(-1px); }
    .btn-edit:hover   { background:#ffffff; box-shadow:0 2px 8px rgba(0,0,0,0.12); }
    .btn-delete:hover { background:#FEE2E2; color:#B91C1C; box-shadow:0 2px 8px rgba(239,68,68,0.15); }
    .btn-act:hover    { background:#D1FAE5; box-shadow:0 2px 8px rgba(16,185,129,0.2); }
    .btn-inact:hover  { background:#FEE2E2; box-shadow:0 2px 8px rgba(239,68,68,0.15); }

    .service-management-outlet header button, .service-management-outlet .tab-btn, .service-management-outlet .sf-btn {
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    }
    .service-management-outlet header button:active { transform: scale(0.97); }

    /* Animations */
    .modal-box { animation: modalIn 0.28s cubic-bezier(0.34, 1.3, 0.64, 1) both; }
    @keyframes modalIn {
      from { opacity:0; transform: scale(0.95) translateY(12px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }

    .add-svc-menu > div { animation: dropIn 0.18s cubic-bezier(0.34, 1.3, 0.64, 1) both; }
    @keyframes dropIn {
      from { opacity:0; transform: translateY(-6px) scale(0.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    .service-management-outlet input:focus, .service-management-outlet select:focus, .service-management-outlet textarea:focus { outline: none; box-shadow: 0 0 0 3px rgba(110,78,88,0.12); border-color: #6e4e58 !important; }
    .line-clamp-2 { display:-webkit-box; line-clamp:2; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

    .modal-body::-webkit-scrollbar { width:4px; }
    .modal-body::-webkit-scrollbar-thumb { background:#e5e0da; border-radius:4px; }
    .modal-body::-webkit-scrollbar-thumb:hover { background:#ccc5bd; }
    .img-upload-container:hover .edit-icon-btn { opacity: 1; }

    .supplier-empty-state {
      min-height: calc(100vh - 190px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 16px 76px;
      text-align: center;
      color: #a1a1aa;
      transform: translateY(-18px);
    }

    .supplier-empty-state.hidden {
      display: none;
    }

    .supplier-empty-art {
      position: relative;
      width: min(430px, 82vw);
      height: 172px;
      margin-bottom: 4px;
      opacity: 0.58;
    }

    .supplier-empty-card {
    position: absolute;
      border: 1px solid rgba(218, 218, 218, 0.9);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: 0 14px 42px rgba(40, 40, 40, 0.035);
    }

    .supplier-empty-card.back {
      left: 74px;
      top: 4px;
      width: 238px;
      height: 92px;
      transform: rotate(3deg);
      opacity: 0.55;
    }

    .supplier-empty-card.mid {
      right: 22px;
      top: 62px;
      width: 240px;
      height: 98px;
      transform: rotate(7deg);
      opacity: 0.62;
    }

    .supplier-empty-card.front {
      left: 16px;
      top: 64px;
      width: 294px;
      height: 94px;
      transform: rotate(-4deg);
      opacity: 0.88;
    }

    .supplier-empty-thumb,
    .supplier-empty-line,
    .supplier-empty-chip {
      position: absolute;
      border-radius: 4px;
      background: #eeeeee;
    }

    .supplier-empty-thumb { left: 16px; top: 18px; width: 70px; height: 58px; }
    .supplier-empty-line.long { left: 104px; top: 18px; width: 132px; height: 22px; }
    .supplier-empty-line.med { left: 104px; top: 50px; width: 138px; height: 22px; }
    .supplier-empty-line.short { left: 104px; top: 80px; width: 120px; height: 8px; }
    .supplier-empty-chip { right: 18px; top: 16px; width: 48px; height: 20px; }

    .supplier-empty-message {
      margin: 0 0 24px;
      font-size: 18px;
      line-height: 1.45;
      font-weight: 400;
      color: #a2a2a2;
    }

    .supplier-empty-action {
      display: inline-flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border-radius: 8px;
      background: #242424;
      padding: 0 20px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 14px 24px rgba(24,24,24,0.14);
      transition: transform 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
    }

    .supplier-empty-action:hover {
      background: #111;
      transform: translateY(-1px);
      box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 18px 30px rgba(24,24,24,0.18);
    }

    @media (max-width: 640px) {
      .supplier-empty-state { min-height: calc(100vh - 150px); padding: 40px 12px 64px; transform: none; }
      .supplier-empty-art { height: 150px; transform: scale(0.82); transform-origin: center bottom; }
      .supplier-empty-message { font-size: 16px; }
      .supplier-empty-action { min-height: 46px; font-size: 15px; }
    }
  </style>
</head>
<body class="min-h-screen  service-management-outlet">

<!-- ══════════════════ HEADER ══════════════════ -->
<!-- Search bar and Categories removed as requested. Kept clean branding layout structure -->
<!-- ══════════════════ MAIN ══════════════════ -->
<main class="max-w-7xl mx-auto px-8 py-8">
  


  <div id="cardsGrid" class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
  <div id="emptyState" class="supplier-empty-state hidden" aria-live="polite">
    <div class="supplier-empty-art" aria-hidden="true">
      <div class="supplier-empty-card back">
        <span class="supplier-empty-thumb" style="width:38px;height:44px"></span>
        <span class="supplier-empty-line long"></span>
        <span class="supplier-empty-line med" style="width:170px;height:18px;top:58px"></span>
        <span class="supplier-empty-chip"></span>
      </div>
      <div class="supplier-empty-card mid">
        <span class="supplier-empty-chip"></span>
        <span class="supplier-empty-line med" style="left:34px;top:56px;width:220px"></span>
        <span class="supplier-empty-line long" style="left:34px;top:88px;width:226px"></span>
        <span class="supplier-empty-line short" style="left:34px;top:108px;width:230px;height:12px"></span>
      </div>
      <div class="supplier-empty-card front">
        <span class="supplier-empty-thumb"></span>
        <span class="supplier-empty-line long"></span>
        <span class="supplier-empty-line med"></span>
        <span class="supplier-empty-line short"></span>
        <span class="supplier-empty-chip"></span>
      </div>
    </div>
    <p id="emptyStateMessage" class="supplier-empty-message">How about creating a service right now?</p>
    <button id="emptyStateAction" type="button" class="supplier-empty-action">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M5 19L19 5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M14 5H19V10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M7.5 6.5L8.5 4.5L9.5 6.5L11.5 7.5L9.5 8.5L8.5 10.5L7.5 8.5L5.5 7.5L7.5 6.5Z" fill="currentColor"/>
        <path d="M15.5 15.5L16.25 14L17 15.5L18.5 16.25L17 17L16.25 18.5L15.5 17L14 16.25L15.5 15.5Z" fill="currentColor"/>
      </svg>
      <span id="emptyStateActionLabel">Add Service</span>
    </button>
  </div>
  <div id="loadMoreWrap" class="mt-8 hidden text-center">
    <button id="loadMoreBtn" type="button" onclick="loadMoreCurrentTab()" class="rounded-xl border border-gray-200 bg-white px-5 py-2.5 text-sm font-semibold text-gray-700 shadow-sm transition hover:border-gray-300 hover:bg-gray-50">
      Load more
    </button>
  </div>
</main>


<!-- ══════════════════ MODAL: ADD VENUE ══════════════════ -->
<div id="venueModal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
  <div class="modal-box bg-white rounded-2xl shadow-2xl w-full max-w-2xl relative flex flex-col" style="max-height:92vh">
    <div class="flex items-center justify-between px-7 pt-6 pb-4 border-b border-gray-100 flex-shrink-0">
      <h2 class="text-xl font-bold text-gray-800">Add service (for venue)</h2>
      <button onclick="closeAll()" class="text-gray-400 hover:text-gray-600"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body px-7 py-5 space-y-5 flex-1" style="max-height:70vh">
      <label id="venueImgBox" for="venueImgInput" onclick="triggerBrowse(event,'venueImgInput')" class="img-upload rounded-xl h-40 flex flex-col items-center justify-center gap-2 bg-gray-50 transition">
        <svg class="w-8 h-8 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        <span class="text-sm text-gray-500 font-medium">Upload image</span>
        <span class="text-xs text-gray-400">Click to browse</span>
      </label>
      <input id="venueImgInput" type="file" accept="image/*" class="absolute opacity-0 pointer-events-none w-px h-px" onchange="initAdjustmentFramework('venueImgInput','venueImgBox','vImgData', 16/9)"/>
      <input type="hidden" id="vImgData"/>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Service Name</label>
          <input id="vName" type="text" placeholder="e.g. Grand Ballroom" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-300 transition"/>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Category</label>
          <input type="text" value="Venue" readonly class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm bg-gray-50 text-gray-400 cursor-not-allowed"/>
        </div>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Description</label>
        <textarea id="vDesc" rows="3" placeholder="Describe the venue…" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-300 transition resize-none"></textarea>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Package Price (MMK)</label>
          <input id="vPriceMin" type="number" min="0" step="0.01" placeholder="e.g. 3500" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-300 transition"/>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Customize Price (MMK)</label>
          <input id="vPriceMax" type="number" min="0" step="0.01" placeholder="e.g. 6000" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-300 transition"/>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Max Concurrent</label>
          <input id="vCapacity" type="number" min="1" step="1" placeholder="e.g. 300" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-300 transition"/>
        </div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Venue Name</label>
          <input id="vVenue" type="text" placeholder="e.g. KL Convention Centre" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 transition"/>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Location</label>
          <input id="vLocation" type="text" placeholder="e.g. Yangon, Myanmar" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 transition"/>
        </div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Venue Type</label>
          <select id="vType" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 transition bg-white">
            <option value="">Select type…</option>
            <option value="Indoor">Indoor</option>
            <option value="Outdoor">Outdoor</option>
            <option value="Indoor+Outdoor">Indoor + Outdoor</option>
          </select>
        </div>
      </div>

    </div>
    <div class="flex justify-end gap-3 px-7 py-4 border-t border-gray-100 flex-shrink-0">
      <button onclick="closeAll()" class="px-6 py-2.5 rounded-xl border border-gray-200 text-sm font-semibold text-gray-600 hover:bg-gray-50 transition">Cancel</button>
      <button onclick="saveVenue()" class="px-6 py-2.5 rounded-xl bg-custom-primary text-white text-sm font-semibold transition shadow-sm">Save</button>
    </div>
  </div>
</div>


<!-- ══════════════════ MODAL: ADD OTHERS ══════════════════ -->
<div id="othersModal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
  <div class="modal-box bg-white rounded-2xl shadow-2xl w-full max-w-2xl relative flex flex-col" style="max-height:92vh">
    <div class="flex items-center justify-between px-7 pt-6 pb-4 border-b border-gray-100 flex-shrink-0">
      <h2 class="text-xl font-bold text-gray-800">Add service (others)</h2>
      <button onclick="closeAll()" class="text-gray-400 hover:text-gray-600"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body px-7 py-5 space-y-5 flex-1" style="max-height:70vh">
      <label id="othersImgBox" for="othersImgInput" onclick="triggerBrowse(event,'othersImgInput')"
        class="img-upload rounded-xl h-40 flex flex-col items-center justify-center gap-2 bg-gray-50 transition w-full overflow-hidden">
        <svg class="w-8 h-8 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        <span class="text-sm text-gray-500 font-medium">Upload image</span>
        <span class="text-xs text-gray-400">Click to browse</span>
      </label>
      <input id="othersImgInput" type="file" accept="image/*" class="absolute opacity-0 pointer-events-none w-px h-px" onchange="initAdjustmentFramework('othersImgInput','othersImgBox','oImgData', 16/9)"/>
      <input type="hidden" id="oImgData"/>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Service Name</label>
          <input id="oName" type="text" placeholder="e.g. Live Band" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 transition"/>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Category</label>
          <select id="oCategory" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 transition bg-white"></select>
        </div>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Description</label>
        <textarea id="oDesc" rows="4" placeholder="Describe the service…" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 transition resize-none"></textarea>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
