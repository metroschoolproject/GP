
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- don't forget to change this after sign in to sign up -->
  <title>Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<style>

  :root {
    --env-bg: #e8b4b8;
    --env-dark: #d89aa0;
    --env-border:#f4c7c4e5;
    --paper: #f5e8d9;
    --accent: #6d4c5b;
    --header-font : "Pinyon Script", cursive;
    --body-font: serif;
    --body-font-color: rgba(250, 242, 238, 0.9);
    --focus-color: rgb(247, 236, 236);
    --input-field-color: rgba(249, 237, 228, 0.9);
    --social-btn-hover: rgba(38, 2, 2, 0.471);
    --placeholder: rgba(141, 140, 140, 0.743);
  }

  body{
    font-family: var(--body-font);
    min-height: 100vh;
    margin: 0;
    align-items: center;
  }

  /* text animation */
  .char { 
    display: inline-block; 
    white-space: pre; 
    opacity: 0;
    filter: blur(8px); 
    transform: scale(0.86); 
  }

  #decorLine {
    transition: all 3.5s cubic-bezier(0.22, 1, 0.36, 1);
  }

  #decorLine.signup-mode {
    transform: scale(1.05);
    filter: hue-rotate(25deg) saturate(1.2);
    opacity: 1;
  }

  .sparkle-canvas {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    border-radius:24px;
    overflow:visible;
  }

  /* screen */
  .screen {
    position: absolute;
    inset: 0;
    padding: 38px 40px 40px;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transform: translateX(40px);
    transition: opacity 0.45s cubic-bezier(0.4,0,0.2,1),
                transform 0.45s cubic-bezier(0.4,0,0.2,1);
  }

  .screen.active {
    position: relative;
    opacity: 1;
    pointer-events: all;
    transform: translateX(0);
    inset: unset;
  }

  /* heading */
  .heading-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    min-height: 90px;
    justify-content: center;
  }

  .main-heading {
    font-family: var(--header-font);
    font-size: 44px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1.2;
    letter-spacing: -0.3px;
    margin-bottom: 2px;
  }

  .sub-heading {
    font-family: var(--body-font);
    font-size: 15px;
    color: var(--accent);
    line-height: 1.4;
  }

  /* text fields */
  .field-wrap {
    margin-bottom: 0;
    transition:
      max-height 0.55s cubic-bezier(0.4,0,0.2,1),
      opacity 0.48s cubic-bezier(0.4,0,0.2,1),
      transform 0.48s cubic-bezier(0.4,0,0.2,1);
  }

  .field-wrap.visible {
    max-height: 70px;
    opacity: 1;
    transform: translateY(0);
  }

  .field-wrap.name-wrap.visible {
    max-height: 56px;
  }

  .decorated-input {
    position: relative;
    width: 100%;
  }

  .decorated-input input {
    width: 100%;
    background: var(--input-field-color);
    border: 1px solid var(--env-border);
    border-radius: 12px;
    padding: 20px 16px 12px;
    font-size: 18px;
    color: rgba(15, 1, 1, 0.9);
    outline: none;
    font-family: inherit;
    box-shadow: 5px 5px 10px rgba(2, 2, 2, 0.332);
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }

  .decorated-input input::placeholder {
    color: transparent;
  }

  .decorated-input label {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: #9aa4b2;
    pointer-events: none;
    transition: all 0.25s ease;
  }

  .decorated-input:hover label,
  .decorated-input input:focus + label,
  .decorated-input input:not(:placeholder-shown) + label {
    top: 4px;
    transform: translateY(0);
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 0.3px;
  }

  .decorated-input input:focus {
    border: 1px solid var(--accent);
    box-shadow: 0 0 10px rgba(109, 76, 91, 0.45);
    background-color: var(--focus-color);
  }

  .decorated-input:hover input {
    border-color: rgba(109, 76, 91, 0.6);
  }

  .decorated-input input:-webkit-autofill,
  .decorated-input input:-webkit-autofill:hover,
  .decorated-input input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0px 1000px var(--input-field-color) inset;
    box-shadow: 0 0 0px 1000px var(--input-field-color) inset;
    -webkit-text-fill-color: rgba(15, 1, 1, 0.9);
    transition: background-color 5000s ease-in-out 0s;
  }

  /* eye toggle button */
  .eye-btn {
    position: absolute;
    right: 13px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: var(--accent);
    opacity: 0.55;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 0;
  }

  .eye-btn:hover { opacity: 1; }
  .eye-btn svg { display: block; }

  /* button */
  .btn {
    width: 100%; 
    padding: 14px; 
    border-radius: 12px; 
    border: none;
    font-size: 15px; 
    font-weight: 600; 
    cursor: pointer;
    background-color: var(--accent);
    color: white;
    letter-spacing: 0.2px;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.4s, filter 0.4s;
    box-shadow:5px 5px 8px rgba(0, 0, 0, 0.628);
    position: relative;
    overflow: hidden;
  }

  .btn:hover { 
    transform: translateY(-1px); 
    box-shadow:5px 5px 8px rgba(0, 0, 0, 0.628);
  }

  .btn:active { transform: translateY(0); }

  .btn.hidden { 
    opacity: 0; 
    filter: blur(4px); 
    pointer-events: none; 
  }

  .btn-shimmer {
    position:absolute;
    inset:0;
    background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.18) 50%,transparent 100%);
    transform:translateX(-100%);
    transition:transform 0.5s;
  }

  .btn:hover .btn-shimmer { transform:translateX(100%); }

  /* divider */
  .divider {
    height:1px;
    background:rgba(255,255,255,0.08);
    margin:20px 0;
    position:relative;
    opacity: 1; 
    transition: opacity 0.4s;
    display: flex;
    align-items: center;
    text-align: center;
  }

  .divider span {
    padding: 0 10px;
    font-size: 12px;
    color: var(--accent);
    white-space: nowrap;
  }

  .divider::before,
  .divider::after {
    content: "";
    flex: 1;
    border-bottom: 0.1px solid var(--accent);
  }

  .divider::before { margin-right: 10px; }
  .divider::after { margin-left: 10px; }

  /* social buttons */
  .social-btn {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--accent);
    background-color:var(--input-field-color);
    cursor:pointer;
    font-size:13px;
    color: var(--accent);
    transition:background 0.2s,border-color 0.2s;
    font-family:inherit;
  }

  .social-btn:hover { 
    background-color:var(--social-btn-hover);
    border-color:var(--accent);
    color: var(--paper);
  }

  .toggle-row { 
    text-align:center;
    margin-top:20px;
    font-size:13.5px;
    color:rgba(200,180,255,0.6); 
  }

  /* password strength */
  .strength-seg{
    flex:1;
    height:3px;
    border-radius:999px;
    background:rgba(109,76,91,0.15);
    transition:0.3s;
  }

  .strength-seg.active{
    background:var(--accent);
  }


</style>

  </div><!-- /card -->

  <template id="eyeOpenTemplate">
    <svg id="{id}-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </template>
  <template id="eyeClosedTemplate">
    <svg id="{id}-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
  </template>

    <script>
      const passwordInput = document.getElementById('passwordInput');

      passwordInput.addEventListener('input', updateStrength);

      function updateStrength() {
        const value = passwordInput.value;

        let score = 0;

        if (value.length >= 6) score++;
        if (/[A-Z]/.test(value)) score++;
        if (/[0-9]/.test(value)) score++;
        if (/[^A-Za-z0-9]/.test(value)) score++;

        const segments = ['seg1','seg2','seg3','seg4'];

        segments.forEach((id,index)=>{
          document.getElementById(id)
            .classList.toggle('active', index < score);
        });

        const text = document.getElementById('strengthText');

        if(score <= 1) text.textContent = 'Weak';
        else if(score === 2) text.textContent = 'Fair';
        else if(score === 3) text.textContent = 'Good';
        else text.textContent = 'Strong';
      }

      const $ = id => document.getElementById(id);
      const particles = [];
      let isSignIn = true;
      let isAnimating = false;

      const canvas = $('sparkleCanvas');
      const ctx = canvas.getContext('2d');
      const decorImg = $('decorLine');
      const mainH = $('mainHeading');
      const subH = $('subHeading');
      const mainBtn = $('mainBtn');
      const divider = $('divider');
      const fieldGroup = $('fieldGroup');

      function icon(name, btnId) {
        return $(`${name}Template`).innerHTML.replace(/{id}/g, btnId);
      }

      function toggleVisibility(inputId, btnId) {
        const input = $(inputId);
        const btn = $(btnId);
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        btn.innerHTML = icon(show ? 'eyeClosed' : 'eyeOpen', btnId);
        btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
      }

      function setModeText(el, signup) {
        el.textContent = el.dataset[signup ? 'signup' : 'signin'];
      }

      function allFields() {
        return Array.from(document.querySelectorAll('#fieldGroup .field-wrap'));
      }

      function modeFields(signup) {
        const mode = signup ? 'signup' : 'signin';
        return allFields()
          .filter(el => el.dataset.modes.split(' ').includes(mode))
          .map(el => el.id);
      }

      function resizeCanvas() {
        canvas.width = canvas.parentElement.offsetWidth;
        canvas.height = canvas.parentElement.offsetHeight;
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      function buildSpans(el, text = el.textContent, hidden) {
        el.innerHTML = '';
        for (let i = 0; i < text.length; i++) {
          const s = document.createElement('span');
          s.className = 'char';
          s.textContent = text[i];
          if (!hidden) { s.style.opacity='1'; s.style.filter='blur(0px)'; s.style.transform='scale(1)'; }
          el.appendChild(s);
        }
      }

      function getCharRects(el) {
        const cardRect = canvas.getBoundingClientRect();
        return Array.from(el.querySelectorAll('.char')).map(s => {
          const r = s.getBoundingClientRect();
          return { el: s, cx: r.left - cardRect.left + r.width/2, cy: r.top - cardRect.top + r.height/2 };
        });
      }

      const WHITE_SHADES = [
        ['rgba(255,182,193,1)', 'rgba(255,105,180,0.88)', 'rgba(255,20,147,0.92)', 'rgba(219,112,147,0.80)', 'rgba(255,192,203,0.65)']
      ];

      class Particle {
        constructor(x, y) {
          this.x=x; this.y=y;
          const angle=Math.random()*Math.PI*2, speed=0.3+Math.random()*1.6;
          this.vx=Math.cos(angle)*speed; this.vy=Math.sin(angle)*speed-0.5;
          this.life=1; this.decay=0.022+Math.random()*0.028;
          this.size=0.25+Math.random()*0.75;
          this.color=WHITE_SHADES[Math.floor(Math.random()*WHITE_SHADES.length)];
          this.twinkle=Math.random()>0.4; this.phase=Math.random()*Math.PI*2;
        }
        update() {
          this.x+=this.vx; this.y+=this.vy;
          this.vy+=0.03; this.vx*=0.97;
          this.life-=this.decay; this.phase+=0.22;
        }
        draw(ctx) {
          const a=Math.max(0,this.life), f=this.twinkle?0.5+0.5*Math.sin(this.phase):1;
          ctx.globalAlpha=a*f; ctx.fillStyle=this.color;
          ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill();
          if(this.size>0.55){ctx.globalAlpha=a*f*0.2;ctx.beginPath();ctx.arc(this.x,this.y,this.size*2.2,0,Math.PI*2);ctx.fill();}
        }
      }

      function emitParticles(cx, cy, count) {
        for(let i=0;i<count;i++) particles.push(new Particle(cx,cy));
      }

      function loop() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for(let i=particles.length-1;i>=0;i--){
          particles[i].update(); particles[i].draw(ctx);
          if(particles[i].life<=0) particles.splice(i,1);
        }
        requestAnimationFrame(loop);
      }
      loop();

      function dissolveOut(el, onDone) {
        const rects = getCharRects(el);
        rects.forEach(({el:c,cx,cy},i) => {
          setTimeout(()=>{
            if(c.textContent.trim()) emitParticles(cx,cy,10);
            c.style.transition='opacity 0.4s ease,filter 0.4s ease,transform 0.4s ease';
            c.style.opacity='0'; c.style.filter='blur(6px)'; c.style.transform='scale(0.87)';
          }, i*18);
        });
        setTimeout(onDone, rects.length*18+200);
      }

      function assembleIn(el) {
        const rects = getCharRects(el);
        rects.forEach(({el:c,cx,cy},i) => {
          setTimeout(()=>{
            if(c.textContent.trim()) emitParticles(cx,cy,6);
            c.style.transition='opacity 0.48s cubic-bezier(0,0,0.2,1),filter 0.48s cubic-bezier(0,0,0.2,1),transform 0.48s cubic-bezier(0,0,0.2,1)';
            c.style.opacity='1'; c.style.filter='blur(0px)'; c.style.transform='scale(1)';
          }, i*20);
        });
        return rects.length*42+500;
      }

      function hideAllFields(onDone) {
        allFields().forEach((el, i) => {
          setTimeout(() => {
            el.style.transition = `max-height 0.45s cubic-bezier(0.4,0,0.2,1) ${i*60}ms, opacity 0.38s cubic-bezier(0.4,0,0.2,1) ${i*60}ms, transform 0.38s cubic-bezier(0.4,0,0.2,1) ${i*60}ms`;
            el.style.maxHeight = '0';
            el.style.opacity = '0';
            el.style.transform = 'translateY(10px)';
            el.classList.remove('visible');
          }, i*60);
        });
        setTimeout(onDone, allFields().length*60+480);
      }

      function showFields(ids) {
        ids.forEach((id, i) => {
          setTimeout(() => {
            const el = $(id);
            el.style.maxHeight = el.dataset.height;
            el.style.opacity = '1';
            el.style.transform = 'translateY(0)';
            el.style.marginBottom = el.dataset.margin;
          }, i * 90);
        });
      }

      function setupInitialFields(ids) {
        allFields().forEach(el => {
          const visible = ids.includes(el.id);
          el.style.transition = 'none';
          el.style.maxHeight = visible ? el.dataset.height : '0';
          el.style.opacity = visible ? '1' : '0';
          el.style.transform = visible ? 'translateY(0)' : 'translateY(10px)';
          el.style.marginBottom = visible ? el.dataset.margin : '0';
          requestAnimationFrame(() => requestAnimationFrame(() => { el.style.transition = ''; }));
        });
      }

      function switchDecorImage(src) {
        decorImg.style.transition =
        "opacity 3s cubic-bezier(0.22, 1, 0.36, 1), transform 3s cubic-bezier(0.22, 1, 0.36, 1)";
        decorImg.style.opacity = "0";
        decorImg.style.transform = "scale(0.9)";

        setTimeout(() => {
          decorImg.onerror = () => console.error("Image failed:", src);
          decorImg.onload = () => {
            decorImg.style.opacity = "1";
            decorImg.style.transform = "scale(1)";
          };
          decorImg.src = src + "?t=" + Date.now();
        }, 1000);
      }

      function setDecorMode(isSignup) {
        decorImg.classList.toggle('signup-mode', isSignup);
      }

      buildSpans(mainH, mainH.textContent, false);
      buildSpans(subH, subH.textContent, false);
      setupInitialFields(modeFields(false));
      fieldGroup.classList.add('mb-2');
      mainBtn.classList.remove('hidden');
      divider.classList.remove('hidden');

      $('toggleBtn').addEventListener('click', () => {
        if (isAnimating) return;
        isAnimating = true;

        document.querySelectorAll('#fieldGroup input').forEach(input => input.value = '');
        ['passwordInput', 'confirmInput'].forEach(inputId => {
          const input = $(inputId);
          const btnId = inputId === 'passwordInput' ? 'eyePassword' : 'eyeConfirm';
          if (input) input.type = 'password';
          if ($(btnId)) $(btnId).innerHTML = icon('eyeOpen', btnId);
        });

        const goingToSignup = isSignIn;
        const nextFields = modeFields(goingToSignup);

        setDecorMode(goingToSignup);
        switchDecorImage('signInDecorLine.png');

        fieldGroup.classList.toggle('mb-5', goingToSignup);
        fieldGroup.classList.toggle('mb-2', !goingToSignup);

        mainBtn.classList.add('hidden');
        divider.classList.add('hidden');

        dissolveOut(mainH, ()=>{});
        dissolveOut(subH, ()=>{
          isSignIn = !isSignIn;
          const isSignup = !isSignIn;

          setModeText(mainH, isSignup);
          setModeText(subH, isSignup);
          buildSpans(mainH, mainH.textContent, true);
          buildSpans(subH, subH.textContent, true);

          setTimeout(()=>{
            const t1 = assembleIn(mainH);
            const t2 = assembleIn(subH);
            setTimeout(()=>{ isAnimating = false; }, Math.max(t1,t2));
          }, 80);
        });

        hideAllFields(()=>{
          showFields(nextFields);
          setTimeout(()=>{
            mainBtn.classList.remove('hidden');
            divider.classList.remove('hidden');
          }, nextFields.length*90+200);
        });

        setModeText($('btnText'), goingToSignup);
        setModeText($('togglePrompt'), goingToSignup);
        setModeText($('toggleBtn'), goingToSignup);
      });


   
  </script>
</body>
</html>
